<!DOCTYPE html>
<!-- Authentication page shell: sign-in form and MFA modal container. -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CICJ-SHCOMS</title>
    <link rel="stylesheet" href="css/bootstrap-icons/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/global.css?v=20260402a">
    <link rel="stylesheet" href="css/login.css?v=20260402a">
    <link rel="stylesheet" href="css/system-typography.css?v=20260329a">
    <link rel="stylesheet" href="css/button-hover-glow.css?v=20260328c">
</head>
<body>
    <!-- Login shell: brand block, auth form, and MFA modal hooks. -->
    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand-header">
                <div class="brand-title-row">
                    <img src="Images/CICJ.png" alt="CICJ Logo" class="brand-logo">
                    <h2>CICJ-SHCOMS</h2>
                </div>
                <p>Secure Hybrid Construction Management System</p>
            </div>
            <div id="error-message" class="error-box hidden"></div>
            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@cicj.com">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary w-full">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>
            </form>

            <!-- SSO Login Options: alternate sign-in path via Google Workspace. -->
            <div class="sso-divider">
                <span>OR</span>
            </div>

            <div class="sso-buttons">
                <button type="button" class="btn-sso btn-google" id="google-sso-btn">
                    <svg class="sso-icon" viewBox="0 0 24 24">
                        <path fill="#2dad50" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google Workspace
                </button>
            </div>
        </div>
    </div>

    <!-- MFA OTP Modal: second-step verification after password check. -->
    <div id="otp-modal" class="modal hidden">
        <div class="modal-content otp-modal-content">
            <div class="otp-header">
                <div class="otp-icon">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h3>Verify Your Identity</h3>
                <p>Enter the 6-digit code sent to your email</p>
                <p id="otp-email-display" class="email-display"></p>
            </div>
            
            <div id="otp-error-message" class="error-box hidden"></div>
            <div id="otp-success-message" class="success-box hidden"></div>
            
            <form id="otp-form">
                <div class="otp-input-group">
                    <input type="text" id="otp-1" class="otp-digit" maxlength="1" pattern="\d" required>
                    <input type="text" id="otp-2" class="otp-digit" maxlength="1" pattern="\d" required>
                    <input type="text" id="otp-3" class="otp-digit" maxlength="1" pattern="\d" required>
                    <input type="text" id="otp-4" class="otp-digit" maxlength="1" pattern="\d" required>
                    <input type="text" id="otp-5" class="otp-digit" maxlength="1" pattern="\d" required>
                    <input type="text" id="otp-6" class="otp-digit" maxlength="1" pattern="\d" required>
                </div>
                
                <div class="otp-info">
                    <div class="timer-container">
                        <i class="bi bi-clock"></i>
                        <span>Code expires in: <span id="otp-timer">5:00</span></span>
                    </div>
                    <p id="otp-attempts-info"></p>
                </div>
                
                <button type="submit" class="btn-primary w-full" id="verify-otp-btn">
                    <i class="bi bi-check-circle"></i> Verify Code
                </button>
                
                <button type="button" class="btn-secondary w-full" id="resend-otp-btn">
                    <i class="bi bi-arrow-clockwise"></i> Resend Code
                </button>
                
                <button type="button" class="btn-link" id="cancel-otp-btn">
                    <i class="bi bi-arrow-left"></i> Back to Login
                </button>
            </form>
        </div>
    </div>

    <script src="js/permissions-map.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
