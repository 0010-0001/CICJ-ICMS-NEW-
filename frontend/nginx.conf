server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|avif|ico|mp4)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
