server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets: serve directly with caching
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|avif|ico|mp4|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # Known HTML pages: serve directly
    location ~* \.html$ {
        try_files $uri =404;
    }

    # Everything else (API, login, oauth, etc.) → proxy to backend Express
    location / {
        try_files $uri @backend;
    }

    location @backend {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
